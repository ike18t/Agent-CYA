name: ci

on:
  pull_request:
  push:
    branches: [main]

# Read-only — CI runs against untrusted PR code, so it must not be able
# to write anywhere or reach any secret. Anything beyond this is the
# `pull_request_target` foot-gun.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "23.9"
          cache: "npm"
      - run: npm ci
      - run: npm test
      - run: npm run lint
      - run: npm run build
